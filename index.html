<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esports Arena</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

/* 🌌 BACKGROUND */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  height:100vh;
  background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* DARK OVERLAY */
body::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
}

/* PARTICLES */
#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

/* CONTAINER */
.container-box{
  position:relative;
  z-index:2;
  width:100%;
  max-width:400px;
}

/* LOGO */
.logo{
  text-align:center;
  font-size:28px;
  font-weight:900;
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}

/* GLASS CARD */
.form-box{
  position:relative;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  overflow:hidden;
}

/* NEON BORDER */
.form-box::before{
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:20px;
  background:linear-gradient(90deg,#3b82f6,#6366f1,#38bdf8);
  z-index:-1;
  filter:blur(12px);
  opacity:0.7;
}

/* TEXT */
h2{ color:white; }
.text-muted{ color:#cbd5e1 !important; }

/* INPUT */
input{
  border-radius:12px !important;
  background:rgba(255,255,255,0.1) !important;
  border:1px solid rgba(255,255,255,0.2) !important;
  color:white !important;
}
input::placeholder{ color:#cbd5e1 !important; }

input:focus{
  box-shadow:0 0 10px #6366f1 !important;
}

/* PASSWORD */
.password-box{ position:relative; }
.eye{
  position:absolute;
  right:12px;
  top:10px;
  cursor:pointer;
  color:#cbd5e1;
}

/* BUTTONS */
.btn{
  border-radius:12px;
  transition:0.3s;
}
.btn-primary{
  background:linear-gradient(90deg,#3b82f6,#6366f1);
  border:none;
}
.btn-success{
  background:linear-gradient(90deg,#10b981,#22c55e);
  border:none;
}
.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(99,102,241,0.8);
}

/* LINKS */
.link{
  color:#38bdf8;
  cursor:pointer;
}

/* 🎮 ROLE SELECT */
.role-select{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.role-card{
  flex:1;
  padding:12px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:#cbd5e1;
  transition:0.3s;
  font-weight:600;
  position:relative;
  overflow:hidden;
}

.role-card:hover{
  transform:translateY(-3px);
  box-shadow:0 0 15px rgba(99,102,241,0.5);
}

/* LIGHT SWEEP */
.role-card::after{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.3),transparent);
  transition:0.5s;
}
.role-card:hover::after{
  left:100%;
}

/* ACTIVE */
.role-card.active{
  background:linear-gradient(90deg,#3b82f6,#6366f1);
  color:white;
  box-shadow:0 0 20px rgba(99,102,241,0.9);
}

/* HIDDEN */
.hidden{ display:none; }

/* TOGGLE */
.toggle{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  color:white;
  font-size:18px;
}

</style>
</head>

<body>

<div id="particles"></div>

<div class="toggle" onclick="toggleTheme()">🌙</div>

<div class="container-box">

  <div class="logo">Esports Arena</div>

  <div class="form-box">

    <h2 class="mb-2 text-center">Welcome Back</h2>
    <p class="text-muted text-center mb-4">Login or create account</p>

    <!-- LOGIN -->
    <div id="loginSection">

      <!-- ROLE -->
      <div class="role-select">
        <div class="role-card active" onclick="selectRole('user', this)">👤 Player</div>
        <div class="role-card" onclick="selectRole('organizer', this)">🏆 Organizer</div>
      </div>

      <input type="hidden" id="role" value="user">

      <input id="loginEmail" class="form-control mb-3" placeholder="Email">

      <div class="password-box mb-3">
        <input id="loginPassword" type="password" class="form-control" placeholder="Password">
        <span class="eye" onclick="togglePassword()">👁</span>
      </div>

      <div class="d-flex justify-content-between mb-3">
        <div>
          <input type="checkbox" id="remember"> 
          <small class="text-muted">Remember</small>
        </div>
        <span class="link" onclick="forgotPassword()">Forgot?</span>
      </div>

      <button class="btn btn-primary w-100 mb-3" onclick="login()">Login</button>

      <p class="text-center text-muted">
        Don't have an account? 
        <span class="link" onclick="showRegister()">Sign up</span>
      </p>
    </div>

    <!-- REGISTER -->
    <div id="registerSection" class="hidden">
      <input id="name" class="form-control mb-3" placeholder="Full Name">
      <input id="email" class="form-control mb-3" placeholder="Email">
      <input id="password" type="password" class="form-control mb-3" placeholder="Password">

      <button class="btn btn-success w-100 mb-3" onclick="register()">Create Account</button>

      <p class="text-center text-muted">
        Already have an account? 
        <span class="link" onclick="showLogin()">Login</span>
      </p>
    </div>

  </div>

</div>

<!-- PARTICLES SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>

// PARTICLES INIT
tsParticles.load("particles", {
  background: { color: "transparent" },
  particles: {
    number: { value: 70 },
    color: { value: "#6366f1" },
    links: {
      enable: true,
      color: "#6366f1",
      distance: 140,
      opacity: 0.4
    },
    move: { enable: true, speed: 1 },
    size: { value: { min: 1, max: 3 } },
    opacity: { value: 0.5 }
  }
});

// THEME
function toggleTheme(){
  document.body.classList.toggle('light');
}

// PASSWORD
function togglePassword(){
  let input = document.getElementById("loginPassword");
  input.type = input.type === "password" ? "text" : "password";
}

// ROLE
function selectRole(role, el){
  $('#role').val(role);
  $('.role-card').removeClass('active');
  $(el).addClass('active');
}

// FORGOT
function forgotPassword(){
  alert("Contact admin to reset password");
}

// TOGGLE FORMS
function showRegister(){
  $('#loginSection').fadeOut(200, () => $('#registerSection').fadeIn(300));
}
function showLogin(){
  $('#registerSection').fadeOut(200, () => $('#loginSection').fadeIn(300));
}

// REGISTER
function register(){
  $.ajax({
    url: 'http://localhost:3000/register',
    method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({
      name: $('#name').val(),
      email: $('#email').val(),
      password: $('#password').val()
    }),
    success: function(res){
      alert(res);
      showLogin();
    }
  });
}

// LOGIN
function login(){

  let role = $('#role').val();

  $.ajax({
    url: 'http://localhost:3000/login',
    method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({
      email: $('#loginEmail').val(),
      password: $('#loginPassword').val()
    }),
    success: function(user){

      if(user === 'Invalid Credentials'){
        alert('Invalid Credentials');
        return;
      }

      user.role = role;

      if($('#remember').is(':checked')){
        localStorage.setItem('currentUser', JSON.stringify(user));
      }

      if(role === 'organizer'){
        window.location.href = "organizer.html";
      } else {
        window.location.href = "user.html";
      }
    }
  });
}

</script>

</body>
</html>
