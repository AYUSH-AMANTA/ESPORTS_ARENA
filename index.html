<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esports Arena</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f1f5f9;
}

/* LEFT IMAGE */
.image-section {
  height: 100vh;
  background: url('images/login.png') center/cover no-repeat;
}

/* RIGHT SIDE */
.form-section {
  height: 100vh;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* LOGO */
.logo {
  position: absolute;
  top: 25px;
   text-align: center;
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(90deg, #2563eb, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 1px;
}

/* FORM BOX */
.form-box {
  width: 100%;
  max-width: 350px;
}

/* HEADINGS */
h2 {
  color: #0f172a;
}

/* INPUT */
input {
  border-radius: 10px !important;
  background: #f8fafc !important;
  border: 1px solid #cbd5e1 !important;
  color: #0f172a !important;
}

input::placeholder {
  color: #64748b !important;
}

/* BUTTON */
button {
  border-radius: 10px !important;
}

/* PRIMARY BUTTON */
.btn-primary {
  background: #2563eb;
  border: none;
}

.btn-primary:hover {
  background: #1d4ed8;
}

/* SUCCESS BUTTON */
.btn-success {
  background: #10b981;
  border: none;
}

.btn-success:hover {
  background: #059669;
}

/* LINKS */
.link {
  color: #2563eb;
  cursor: pointer;
  font-weight: 500;
}

.link:hover {
  text-decoration: underline;
}

/* TEXT */
.text-muted {
  color: #64748b !important;
}

/* CARD STYLE (Dashboard) */
.card {
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  background: #ffffff;
}

/* HIDDEN */
.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- LEFT IMAGE -->
    <div class="col-md-7 d-none d-md-block p-0">
      <div class="image-section"></div>
    </div>

    <!-- RIGHT FORM -->
    <div class="col-md-5 form-section">

      <!-- LOGO -->
      <div class="logo">Esports Arena</div>

      <div class="form-box">

        <h2 class="mb-2">Welcome</h2>
        <p class="text-muted mb-4">Sign in or create an account</p>

        <!-- LOGIN -->
        <div id="loginSection">
          <input id="loginEmail" class="form-control mb-3" placeholder="Email">
          <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Password">

          <button class="btn btn-primary w-100 mb-3" onclick="login()">Login</button>

          <p class="text-center">
            Don't have an account? 
            <span class="link" onclick="showRegister()">Sign up</span>
          </p>
        </div>

        <!-- REGISTER -->
        <div id="registerSection" class="hidden">
          <input id="name" class="form-control mb-3" placeholder="Name">
          <input id="email" class="form-control mb-3" placeholder="Email">
          <input id="password" type="password" class="form-control mb-3" placeholder="Password">

          <button class="btn btn-success w-100 mb-3" onclick="register()">Create Account</button>

          <p class="text-center">
            Already have an account? 
            <span class="link" onclick="showLogin()">Login</span>
          </p>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden container mt-5">
  <h2>Admin Dashboard</h2>
  <button class="btn btn-danger mb-3" onclick="logout()">Logout</button>

  <h4>Users</h4>
  <div id="users"></div>
</div>

<script>

// TOGGLE FORMS
function showRegister(){
  $('#loginSection').hide();
  $('#registerSection').fadeIn();
}

function showLogin(){
  $('#registerSection').hide();
  $('#loginSection').fadeIn();
}

// REGISTER
function register(){
  $.ajax({
    url: 'http://localhost:3000/register',
    method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({
      name: $('#name').val(),
      email: $('#email').val(),
      password: $('#password').val()
    }),
    success: function(res){
      alert(res);
      showLogin();
    }
  });
}

// LOGIN
function login(){
  $.ajax({
    url: 'http://localhost:3000/login',
    method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({
      email: $('#loginEmail').val(),
      password: $('#loginPassword').val()
    }),
    success: function(user){

      if(user === 'Invalid Credentials'){
        alert('Invalid Credentials');
        return;
      }

      localStorage.setItem('currentUser', JSON.stringify(user));

      if(user.role === 'admin'){
        loadDashboard();
      }else{
        window.location.href = "user.html";
      }
    }
  });
}

// LOAD DASHBOARD
function loadDashboard(){
  $('body').html($('#dashboard'));
  $('#dashboard').show();

  $.get('http://localhost:3000/users', function(data){
    let html = '';
    data.forEach(u => {
      html += `<div class="card p-2 mb-2">
        ${u.name} - ${u.email}
      </div>`;
    });
    $('#users').html(html);
  });
}

// LOGOUT
function logout(){
  localStorage.removeItem('currentUser');
  location.reload();
}

// AUTO LOGIN CHECK
let currentUser = JSON.parse(localStorage.getItem('currentUser'));
if(currentUser && currentUser.role === 'admin'){
  loadDashboard();
}

</script>

</body>
</html>
