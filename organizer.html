<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizer Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f8fafc;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  background:#ffffff;
  border-right:1px solid #e2e8f0;
  padding:20px;
}

.logo{
  font-size:20px;
  font-weight:700;
  color:#2563eb;
  margin-bottom:30px;
}

.menu-item{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:8px;
  color:#475569;
  transition:0.2s;
}

.menu-item:hover{
  background:#f1f5f9;
  color:#2563eb;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.header h3{
  margin:0;
  color:#0f172a;
}

.user-box{
  background:#ffffff;
  border:1px solid #e2e8f0;
  padding:8px 15px;
  border-radius:8px;
  font-size:14px;
}

/* CARD */
.card{
  border-radius:14px;
  border:1px solid #e2e8f0;
  background:#ffffff;
  padding:20px;
  margin-bottom:20px;
  transition:0.2s;
}

.card:hover{
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* INPUT */
input{
  border-radius:8px !important;
  border:1px solid #cbd5e1 !important;
  background:#f8fafc !important;
}

input:focus{
  border-color:#2563eb !important;
  box-shadow:0 0 0 2px rgba(37,99,235,0.1);
}

/* BUTTON */
.btn-custom{
  background:#2563eb;
  color:white;
  border:none;
}

.btn-custom:hover{
  background:#1d4ed8;
}

/* SECTION TITLE */
.section-title{
  font-size:16px;
  font-weight:600;
  margin-bottom:15px;
  color:#0f172a;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Organizer Panel</div>

  <div class="menu-item" onclick="loadTournaments()">All Tournaments</div>
  <div class="menu-item" onclick="toggleCreate()">Create Tournament</div>

  <button class="btn btn-outline-danger w-100 mt-3" onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <h3>Dashboard</h3>
    <div class="user-box" id="userEmail"></div>
  </div>

  <!-- CREATE SECTION -->
  <div id="createSection" class="card" style="display:none;">
    <div class="section-title">Create Tournament</div>

    <input id="name" class="form-control mb-2" placeholder="Tournament Name">
    <input id="game" class="form-control mb-2" placeholder="Game">
    <input id="entry_fee" class="form-control mb-2" placeholder="Entry Fee">
    <input id="prize" class="form-control mb-2" placeholder="Prize">
    <input id="date" class="form-control mb-3" placeholder="Date">

    <button class="btn btn-custom w-100" onclick="createTournament()">
      Create Tournament
    </button>
  </div>

  <!-- TOURNAMENT LIST -->
  <div id="tournaments"></div>

</div>

<script>

// USER CHECK
let user = JSON.parse(localStorage.getItem('currentUser'));

if(!user){
  window.location.href = "index.html";
}else{
  $('#userEmail').text(user.email);
}

// TOGGLE CREATE FORM
function toggleCreate(){
  $('#createSection').slideToggle();
}

// CREATE TOURNAMENT
function createTournament(){

  const data = {
    name: $('#name').val(),
    game: $('#game').val(),
    entry_fee: $('#entry_fee').val(),
    prize: $('#prize').val(),
    date: $('#date').val(),
    organizer_id: user.id   // 🔥 ADD THIS LINE
  };

  console.log(data); // DEBUG

  $.ajax({
    url:'http://localhost:3000/createTournament',
    method:'POST',
    contentType:'application/json',
    data: JSON.stringify(data),

    success:function(res){
      alert(res);
      loadTournaments();
      $('#createSection').slideUp();
    },

    error:function(err){
      console.log(err);
      alert("Error creating tournament");
    }
  });
}
// LOAD TOURNAMENTS
function loadTournaments(){

  $.get('http://localhost:3000/tournaments', function(data){

    let html='';

    data.forEach(t=>{

      html+=`
        <div class="card">

          <div class="section-title">${t.name}</div>

          <div class="text-muted mb-1">Game: ${t.game}</div>
          <div class="text-muted mb-1">Entry Fee: ₹${t.entry_fee}</div>
          <div class="text-muted mb-1">Prize: ₹${t.prize}</div>
          <div class="text-muted mb-3">Date: ${t.date}</div>

          <hr>

          <div class="section-title">Update Match Details</div>

          <input id="room-${t.id}" class="form-control mb-2" placeholder="Room ID">
          <input id="pass-${t.id}" class="form-control mb-2" placeholder="Password">
          <input id="time-${t.id}" class="form-control mb-3" placeholder="Match Time">

          <button class="btn btn-custom w-100" onclick="updateMatch(${t.id})">
            Update Match
          </button>

        </div>
      `;
    });

    $('#tournaments').html(html);

  });
}

// UPDATE MATCH
function updateMatch(id){

  const data = {
    room_id: $(`#room-${id}`).val(),
    room_password: $(`#pass-${id}`).val(),
    match_time: $(`#time-${id}`).val()
  };

  console.log(data); // DEBUG

  $.ajax({
    url:`http://localhost:3000/updateMatch/${id}`,
    method:'POST',
    contentType:'application/json',
    data:JSON.stringify(data),

    success:function(res){
      alert(res);
    },

    error:function(err){
      console.log(err);
      alert("Error updating match");
    }
  });
}

// LOGOUT
function logout(){
  localStorage.removeItem('currentUser');
  window.location.href="index.html";
}

// INIT
loadTournaments();

</script>

</body>
</html>
