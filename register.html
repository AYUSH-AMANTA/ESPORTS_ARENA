<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f1f5f9;
  padding-top:70px;
}

/* NAVBAR */
.navbar{
  background:#ffffff;
  border-bottom:1px solid #e2e8f0;
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  height:70px;
}

.navbar-brand{
  font-weight:700;
  color:#2563eb !important;
}

.nav-link{
  color:#475569 !important;
  font-weight:500;
}

.nav-link:hover{
  color:#2563eb !important;
}

/* IMAGE */
.image-wrapper{
  height:calc(100vh - 70px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px;
}

.image-section{
  width:100%;
  height:100%;
  background:url('images/registration.png') center/cover no-repeat;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
  padding:25px;
}

.image-section::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);
}

.overlay-text{
  color:white;
  z-index:2;
}

/* FORM */
.form-section{
  height:calc(100vh - 70px);
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffff;
}

.form-box{
  width:100%;
  max-width:440px;
}

h2{
  color:#0f172a;
}

/* TOURNAMENT CARD */
#tournamentDetails{
  border-radius:14px;
  border:1px solid #cbd5e1;
  background:#e2e8f0;
  padding:15px;
}

/* FORM CARD */
.form-card{
  border-radius:14px;
  border:1px solid #e2e8f0;
  background:#ffffff;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  padding:20px;
}

/* INPUT */
input, select{
  border-radius:8px !important;
  border:1px solid #cbd5e1 !important;
  background:#f8fafc !important;
}

input:focus, select:focus{
  border-color:#2563eb !important;
  box-shadow:0 0 0 2px rgba(37,99,235,0.1);
}

/* BUTTON */
.btn-custom{
  background:#2563eb;
  color:white;
  border:none;
}

.btn-custom:hover{
  background:#1d4ed8;
}

.loader{
  display:none;
  text-align:center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4 d-flex justify-content-between">

  <div class="d-flex align-items-center gap-4">
    <span class="navbar-brand"> Esports Arena</span>

    <div class="d-none d-md-flex gap-3">
      <a class="nav-link" href="user.html">Dashboard</a>
      <a class="nav-link" href="#">My Tournaments</a>
      <a class="nav-link" href="#">Support</a>
    </div>
  </div>

  <div class="d-flex align-items-center gap-3">
    <span id="userEmail" class="text-muted small"></span>
    <button class="btn btn-outline-primary btn-sm" onclick="goBack()">Back</button>
    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
  </div>

</nav>

<div class="container-fluid">
  <div class="row">

    <!-- IMAGE -->
    <div class="col-md-6 d-none d-md-block">
      <div class="image-wrapper">
        <div class="image-section">
          <div class="overlay-text">
            <h3>Join the Battle</h3>
            <p>Compete with top players and win exciting prizes.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="col-md-6 form-section">
      <div class="form-box">

        <h2 class="mb-2">Tournament Registration</h2>
        <p class="text-muted mb-4">Complete your registration</p>

        <div id="tournamentDetails" class="mb-4"></div>

        <div class="form-card">

          <h6>Personal Details</h6>
          <input id="playerName" class="form-control mb-2" placeholder="Full Name">
          <input id="email" class="form-control mb-2" placeholder="Email">
          <input id="phone" class="form-control mb-3" placeholder="Phone Number">

          <h6>Game Details</h6>
          <input id="gameId" class="form-control mb-2" placeholder="Game UID">
          <input id="inGameName" class="form-control mb-2" placeholder="In-Game Name">
          <select id="teamType" class="form-control mb-3">
            <option value="">Select Team Type</option>
            <option>Solo</option>
            <option>Duo</option>
            <option>Squad</option>
          </select>

          <button class="btn btn-custom w-100" onclick="makePayment()">Proceed to Payment</button>

          <div class="loader mt-3" id="loader">
            Processing...
          </div>

        </div>

      </div>
    </div>

  </div>
</div>

<script>

// USER
let user = JSON.parse(localStorage.getItem('currentUser'));
if(!user){
  window.location.href = "index.html";
}else{
  $('#userEmail').text(user.email);
}

// NAV
function goBack(){
  window.location.href = "user.html";
}

function logout(){
  localStorage.removeItem('currentUser');
  window.location.href = "index.html";
}

// LOAD TOURNAMENT
let tournamentId = new URLSearchParams(window.location.search).get('tournamentId');

$.get('http://localhost:3000/tournaments', function(data){
  let t = data.find(x => x.id == tournamentId);

  $('#tournamentDetails').html(`
    <h6>${t.name}</h6>
    <p class="text-muted">Game: ${t.game}</p>
    <p class="text-muted">Entry Fee: ₹${t.entry_fee}</p>
    <p class="text-muted">Prize: ₹${t.prize}</p>
    <p class="text-muted">Date: ${t.date}</p>
  `);
});

// PAYMENT
function makePayment(){

  let data = {
    name: $('#playerName').val(),
    email: $('#email').val(),
    phone: $('#phone').val(),
    gameId: $('#gameId').val(),
    inGameName: $('#inGameName').val(),
    teamType: $('#teamType').val()
  };

  if(!data.name || !data.email || !data.phone || !data.gameId || !data.inGameName || !data.teamType){
    alert('Fill all fields');
    return;
  }

  $('#loader').show();

  setTimeout(() => {

    $('#loader').hide();
    alert('Payment Successful');

    $.ajax({
      url: 'http://localhost:3000/registerTournament',
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify({
        userId: user.id,
        tournamentId: tournamentId
      }),
      success: function(){
        alert('Registration Confirmed!');
        window.location.href = "user.html";
      }
    });

  }, 2000);
}

</script>

</body>
</html>
