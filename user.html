<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esports Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
  color: white;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar{
  width: 260px;
  height: 100vh;
  position: fixed;
  background: linear-gradient(180deg, #0f1419 0%, #020617 100%);
  border-right: 1px solid #1e293b;
  padding: 25px;
  overflow-y: auto;
  z-index: 1000;
  box-shadow: 2px 0 15px rgba(0, 0, 0, 0.5);
}

.logo{
  font-size: 24px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
  margin-bottom: 35px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
  background: linear-gradient(135deg, #38bdf8, #06b6d4, #14b8a6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6));
  text-transform: uppercase;
  transition: all 0.3s ease;
}

.logo:hover {
  filter: drop-shadow(0 0 16px rgba(56, 189, 248, 0.9)) drop-shadow(0 0 8px rgba(6, 182, 212, 0.6));
  transform: scale(1.05);
}

.logo i {
  font-size: 32px;
  animation: pulse 2s ease-in-out infinite;
}

.menu-item{
  padding: 12px 15px;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 10px;
  color: #e0e7ff;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 500;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.5px;
}

.menu-item:hover{
  background: linear-gradient(90deg, #38bdf8, #0ea5e9);
  color: #000;
  transform: translateX(8px);
  box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
}

.menu-item.active{
  background: linear-gradient(90deg, #38bdf8, #0ea5e9);
  color: #000;
  box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
}

.menu-item i {
  font-size: 18px;
  min-width: 20px;
}

.logout-btn{
  width: 100%;
  background: rgba(239, 68, 68, 0.2);
  border: 1px solid #dc2626;
  color: #fca5a5;
  border-radius: 10px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  margin-top: 20px;
}

.logout-btn:hover{
  background: #dc2626;
  color: white;
}

/* MAIN */
.main{
  margin-left: 260px;
  padding: 30px;
  min-height: 100vh;
}

/* HEADER */
.header-top{
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  flex-wrap: wrap;
  gap: 20px;
}

.header-title {
  font-size: 32px;
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #38bdf8, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-transform: uppercase;
}

.user-profile-box{
  display: flex;
  align-items: center;
  gap: 15px;
  background: rgba(56, 189, 248, 0.1);
  padding: 12px 20px;
  border-radius: 12px;
  border: 1px solid rgba(56, 189, 248, 0.3);
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.user-profile-box:hover{
  background: rgba(56, 189, 248, 0.2);
  border-color: rgba(56, 189, 248, 0.6);
}

.user-avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 20px;
}

.user-info {
  display: flex;
  flex-direction: column;
}

.user-email {
  font-size: 14px;
  color: #e0e7ff;
  font-weight: 500;
}

.user-label {
  font-size: 12px;
  color: #94a3b8;
  text-transform: uppercase;
}

/* STATS SECTION */
.stats-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.stat-card {
  background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(6, 182, 212, 0.1));
  border: 1px solid rgba(56, 189, 248, 0.3);
  border-radius: 12px;
  padding: 20px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -50%;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, rgba(56, 189, 248, 0.2), transparent);
  border-radius: 50%;
}

.stat-card:hover {
  transform: translateY(-5px);
  background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(6, 182, 212, 0.2));
  border-color: rgba(56, 189, 248, 0.6);
  box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
}

.stat-icon {
  font-size: 28px;
  color: #38bdf8;
  margin-bottom: 10px;
}

.stat-label {
  font-size: 13px;
  color: #94a3b8;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 600;
  font-family: 'Space Mono', monospace;
  letter-spacing: 1px;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: #38bdf8;
}

/* SECTION TITLE */
.section-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 25px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: #e0e7ff;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.5px;
}

.section-title i {
  color: #38bdf8;
  font-size: 24px;
}

/* TOURNAMENTS CONTAINER */
.tournaments-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 25px;
  margin-bottom: 40px;
}

/* CARD */
.card{
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.8));
  backdrop-filter: blur(8px);
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #38bdf8, #06b6d4, #14b8a6);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s ease;
  z-index: 1;
}

.card:hover::before {
  transform: scaleX(1);
}

.card:hover{
  transform: translateY(-8px);
  border-color: rgba(56, 189, 248, 0.5);
  box-shadow: 0 15px 35px rgba(56, 189, 248, 0.2);
}

.card p {
  margin-bottom: 0 !important;
}

/* IMAGE WRAPPER */
.img-wrapper {
  position: relative;
  width: 100%;
  height: 180px;
  overflow: hidden;
}

/* IMAGE */
.tournament-img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.card:hover .tournament-img {
  transform: scale(1.05);
}

.img-overlay {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(56, 189, 248, 0.9);
  color: black;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* CARD CONTENT */
.card-content {
  padding: 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* TEXT */
.card-title{
  font-size: 18px;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 12px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.5px;
}

.card-text{
  font-size: 14px;
  color: #cbd5e1;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-text i {
  color: #38bdf8;
  min-width: 16px;
}

.card-divider {
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  margin: 15px 0;
}

.match-details {
  font-size: 13px;
}

.match-label {
  color: #86efac;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* BUTTON */
.btn-custom{
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  color: black;
  border: none;
  font-weight: 700;
  border-radius: 10px;
  transition: all 0.3s ease;
  padding: 10px 20px;
  margin-top: auto;
  width: 100%;
}

.btn-custom:hover{
  background: linear-gradient(135deg, #0ea5e9, #06b6d4);
  transform: scale(1.02);
  box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4);
  color: black;
}

/* STATUS BADGES */
.status-badge {
  display: inline-block;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  margin: 5px 0;
  width: 100%;
  text-align: center;
}

.status-pending {
  background: rgba(240, 167, 0, 0.2);
  color: #fbbf24;
  border: 1px solid rgba(251, 191, 36, 0.3);
}

.status-approved {
  background: rgba(34, 197, 94, 0.2);
  color: #86efac;
  border: 1px solid rgba(134, 239, 172, 0.3);
}

.status-rejected {
  background: rgba(239, 68, 68, 0.2);
  color: #fca5a5;
  border: 1px solid rgba(252, 165, 165, 0.3);
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #94a3b8;
  grid-column: 1 / -1;
}

.empty-state i {
  font-size: 64px;
  margin-bottom: 20px;
  color: #475569;
}

.empty-state p {
  font-size: 16px;
  margin: 0;
}

/* RESPONSIVE */
@media (max-width: 992px) {
  .tournaments-grid {
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
}

@media (max-width: 768px) {
  .sidebar {
    width: 240px;
    padding: 15px;
  }

  .main {
    margin-left: 240px;
    padding: 20px;
  }

  .header-top {
    flex-direction: column;
  }

  .tournaments-grid {
    grid-template-columns: 1fr;
  }

  .stats-container {
    grid-template-columns: repeat(2, 1fr);
  }

  .header-title {
    font-size: 26px;
  }
}

@media (max-width: 576px) {
  .sidebar {
    width: 200px;
    padding: 10px;
  }

  .main {
    margin-left: 200px;
    padding: 12px;
  }

  .logo {
    font-size: 16px;
  }

  .menu-item {
    font-size: 13px;
    padding: 10px 8px;
  }

  .tournaments-grid {
    grid-template-columns: 1fr;
    gap: 15px;
  }

  .stats-container {
    grid-template-columns: 1fr;
  }

  .header-title {
    font-size: 20px;
  }

  .user-profile-box {
    width: 100%;
  }
}

/* SCROLLBAR */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: rgba(15, 23, 42, 0.5);
}

::-webkit-scrollbar-thumb {
  background: rgba(56, 189, 248, 0.5);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(56, 189, 248, 0.8);
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6));
  }
  50% {
    transform: scale(1.1);
    filter: drop-shadow(0 0 16px rgba(56, 189, 248, 0.9));
  }
}

.card {
  animation: fadeIn 0.5s ease;
}

.stat-card {
  animation: fadeIn 0.5s ease;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <i class="bi bi-trophy"></i>
    Esports Arena
  </div>

  <div class="menu">
    <div class="menu-item active" onclick="goPage('dashboard')" title="Dashboard">
      <i class="bi bi-speedometer2"></i>
      Dashboard
    </div>

    <div class="menu-item" onclick="goPage('my-tournaments')" title="My Tournaments">
      <i class="bi bi-joystick"></i>
      My Tournaments
    </div>

    <div class="menu-item" onclick="goPage('profile')" title="Profile">
      <i class="bi bi-person-circle"></i>
      Profile
    </div>

    <div class="menu-item" onclick="goPage('settings')" title="Settings">
      <i class="bi bi-gear"></i>
      Settings
    </div>
  </div>

  <button class="logout-btn" onclick="logout()" title="Logout">
    <i class="bi bi-box-arrow-right"></i>
    Logout
  </button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER WITH USER PROFILE -->
  <div class="header-top">
    <h1 class="header-title">
      <i class="bi bi-controller"></i> Dashboard
    </h1>
    <div class="user-profile-box">
      <div class="user-avatar" id="userAvatarInitial">G</div>
      <div class="user-info">
        <div class="user-label">Logged in as</div>
        <div class="user-email" id="userEmail">user@example.com</div>
      </div>
    </div>
  </div>

  <!-- STATISTICS SECTION -->
  <div class="stats-container" id="statsContainer">
    <div class="stat-card">
      <div class="stat-icon"><i class="bi bi-calendar2-check"></i></div>
      <div class="stat-label">Total Tournaments</div>
      <div class="stat-value" id="totalTournaments">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="bi bi-check-circle"></i></div>
      <div class="stat-label">Registrations Approved</div>
      <div class="stat-value" id="approvedRegistrations">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="bi bi-hourglass-split"></i></div>
      <div class="stat-label">Pending Approvals</div>
      <div class="stat-value" id="pendingRegistrations">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="bi bi-lightning-charge"></i></div>
      <div class="stat-label">Win Rate</div>
      <div class="stat-value" id="winRate">--</div>
    </div>
  </div>

  <!-- AVAILABLE TOURNAMENTS SECTION -->
  <div class="section-title">
    <i class="bi bi-collection"></i>
    Available Tournaments
  </div>
  <div class="tournaments-grid" id="tournaments"></div>

  <!-- MY TOURNAMENTS SECTION -->
  <div class="section-title mt-5">
    <i class="bi bi-award"></i>
    My Active Registrations
  </div>
  <div class="tournaments-grid" id="myTournaments"></div>

</div>

<script>

const user = JSON.parse(localStorage.getItem('currentUser'));

// LOGIN CHECK
if(!user){
  window.location.href = "index.html";
} else {
  $('#userEmail').text(user.email);
  // Set avatar initial
  const initial = user.email.charAt(0).toUpperCase();
  $('#userAvatarInitial').text(initial);
}

function getImage(game){
  return "images/user.png";
}

// UPDATE STATISTICS
function updateStatistics(allTournaments, registrations) {
  const totalTournaments = allTournaments.length;
  const approvedCount = registrations.filter(r => r.payment_status === 'approved').length;
  const pendingCount = registrations.filter(r => r.payment_status === 'pending').length;
  
  $('#totalTournaments').text(totalTournaments);
  $('#approvedRegistrations').text(approvedCount);
  $('#pendingRegistrations').text(pendingCount);
}

// LOAD ALL TOURNAMENTS
function loadTournaments(){
  $.get('http://localhost:3000/tournaments', function(data){
    let html = '';

    if(!data || data.length === 0) {
      html = '<div class="empty-state"><i class="bi bi-inbox"></i><p>No tournaments available</p></div>';
    } else {
      data.forEach(t => {
        html += `
          <div class="card">
            <div class="img-wrapper">
              <img src="${getImage(t.game)}" class="tournament-img">
              <div class="img-overlay">
                <i class="bi bi-controller"></i> ${t.game}
              </div>
            </div>
            <div class="card-content">
              <div class="card-title">${t.name}</div>
              <div class="card-text"><i class="bi bi-suit-heart"></i> <strong>Prize:</strong> ₹${t.prize}</div>
              <div class="card-text"><i class="bi bi-cash-coin"></i> <strong>Entry:</strong> ₹${t.entry_fee}</div>
              <div class="card-text"><i class="bi bi-calendar3"></i> <strong>Date:</strong> ${t.date}</div>
              <div id="status-${t.id}">
                <button class="btn btn-custom mt-3" onclick="goToRegister(${t.id})">
                  <i class="bi bi-pencil-square"></i> Register Now
                </button>
              </div>
            </div>
          </div>
        `;
      });
    }

    $('#tournaments').html(html);

    setTimeout(() => {
      loadMyRegistrations();
      loadMyTournaments();
    }, 300);

  }).fail(function() {
    $('#tournaments').html('<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Failed to load tournaments</p></div>');
  });
}

// LOAD REGISTRATION STATUS
function loadMyRegistrations(){
  $.get(`http://localhost:3000/myRegistrations/${user.id}`, function(data){
    const registrations = data || [];
    let totalTournaments = 0;
    let resultHtml = '';

    data.forEach(r => {
      totalTournaments++;
      let statusHTML = "";
      let icon = "";

      if(r.payment_status === "pending"){
        statusHTML = `<span class="status-badge status-pending"><i class="bi bi-clock"></i> Payment Pending</span>`;
        icon = "🟡";
      }
      else if(r.payment_status === "approved"){
        statusHTML = `<span class="status-badge status-approved"><i class="bi bi-check-circle"></i> Approved</span>`;
        icon = "✅";
      }
      else if(r.payment_status === "rejected"){
        statusHTML = `<span class="status-badge status-rejected"><i class="bi bi-x-circle"></i> Rejected</span>`;
        icon = "❌";
      }

      if(statusHTML){
        resultHtml = statusHTML;
        $(`#status-${r.tournament_id}`).html(resultHtml);
      }

    });

    // Update stats in header (this will be called after tournaments are loaded)
    $.get('http://localhost:3000/tournaments', function(allTournaments) {
      updateStatistics(allTournaments, registrations);
    });

  }).fail(function() {
    console.log("Could not load registrations");
  });
}

// LOAD MY TOURNAMENTS
function loadMyTournaments(){
  $.get(`http://localhost:3000/myApprovedTournaments/${user.id}`, function(data){
    let html = '';

    if(!data || data.length === 0){
      html = '<div class="empty-state" style="grid-column: 1 / -1;"><i class="bi bi-inbox"></i><p>No approved tournaments yet</p></div>';
    } else {
      data.forEach(t => {
        html += `
          <div class="card">
            <div class="card-content">
              <div class="card-title"><i class="bi bi-trophy"></i> ${t.name}</div>
              <div class="card-text"><i class="bi bi-controller"></i> <strong>Game:</strong> ${t.game}</div>
              <div class="card-text"><i class="bi bi-gift"></i> <strong>Prize:</strong> ₹${t.prize}</div>
              <div class="card-text"><i class="bi bi-calendar3"></i> <strong>Date:</strong> ${t.date}</div>
              
              <div class="card-divider"></div>
              
              <div class="match-details">
                <div class="match-label"><i class="bi bi-controller"></i> Match Details</div>
                <div class="card-text"><strong>Room ID:</strong> ${t.room_id || '<span class="text-muted">Not Announced</span>'}</div>
                <div class="card-text"><strong>Password:</strong> ${t.room_password || '<span class="text-muted">Not Announced</span>'}</div>
                <div class="card-text"><strong>Match Time:</strong> ${t.match_time || '<span class="text-muted">Not Announced</span>'}</div>
              </div>
            </div>
          </div>
        `;
      });
    }

    $('#myTournaments').html(html);
  }).fail(function() {
    $('#myTournaments').html('<div class="empty-state" style="grid-column: 1 / -1;"><i class="bi bi-exclamation-triangle"></i><p>Failed to load tournaments</p></div>');
  });
}

// NAVIGATION FUNCTIONS
function goToRegister(id){
  window.location.href = `register.html?tournamentId=${id}`;
}

function goPage(page){
  if(page === 'dashboard'){
    window.location.href = "user.html";
  }
  else if(page === 'my-tournaments'){
    window.location.href = "my-tournaments.html";
  }
  else if(page === 'profile'){
    window.location.href = "profile.html";
  }
  else if(page === 'settings'){
    window.location.href = "settings.html";
  }
}

function logout(){
  localStorage.removeItem('currentUser');
  window.location.href = "index.html";
}

// INITIALIZE
loadTournaments();

</script>
</body>
</html>
