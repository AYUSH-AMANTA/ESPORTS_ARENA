<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esports Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  background:#020617;
  border-right:1px solid #1e293b;
  padding:20px;
}

.logo{
  font-size:20px;
  font-weight:700;
  color:#38bdf8;
  margin-bottom:30px;
}

.menu-item{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:8px;
  color:#ffffff;
  transition:0.3s;
}

.menu-item:hover{
  background:#1e293b;
  color:#38bdf8;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:25px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.header h2{
  color:#ffffff;
}

.user-box{
  background:rgba(255,255,255,0.05);
  padding:8px 15px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
}

/* CARD */
.card{
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(8px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* IMAGE */
.tournament-img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

/* TEXT */
.title{
  font-size:16px;
  font-weight:600;
  color:#ffffff;
}

.text{
  font-size:14px;
  color:#ffffff;
  opacity:0.8;
}

/* BUTTON */
.btn-custom{
  background:#38bdf8;
  color:black;
  border:none;
}

.btn-custom:hover{
  background:#0ea5e9;
}

/* LOGOUT */
.logout{
  margin-top:20px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Esports Arena</div>

  <div class="menu-item">Dashboard</div>
  <div class="menu-item" onclick="loadMyTournaments()">My Tournaments</div>
  <div class="menu-item" onclick="goProfile()">Profile</div>
  <div class="menu-item" onclick="goHelp()">Help</div>

  <button class="btn btn-outline-danger w-100 logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>Register Here</h2>
    <div class="user-box" id="userEmail"></div>
  </div>

  <h5 class="mb-3">Available Tournaments</h5>
  <div class="row" id="tournaments"></div>

  <h5 class="mb-3 mt-4">My Tournaments</h5>
  <div class="row" id="myTournaments"></div>

</div>

<script>

function getImage(game){
  return "images/user.png";
}

// LOAD ALL TOURNAMENTS
function loadTournaments(){
  $.get('http://localhost:3000/tournaments', function(data){

    let html = '';

    data.forEach(t => {
      html += `
        <div class="col-md-4 mb-4">
          <div class="card p-3">

            <img src="${getImage(t.game)}" class="tournament-img mb-3">

            <div class="title mb-2">${t.name}</div>

            <div class="text">Game: ${t.game}</div>
            <div class="text">Entry Fee: ₹${t.entry_fee}</div>
            <div class="text">Prize: ₹${t.prize}</div>
            <div class="text mb-3">Date: ${t.date}</div>

            <div id="status-${t.id}">
              <button class="btn btn-custom w-100" onclick="goToRegister(${t.id})">
                Register
              </button>
            </div>

          </div>
        </div>
      `;
    });

    $('#tournaments').html(html);

    setTimeout(() => {
      loadMyRegistrations();
      loadMyTournaments();
    }, 300);

  });
}

// STATUS
function loadMyRegistrations(){

  $.get(`http://localhost:3000/myRegistrations/${user.id}`, function(data){

    data.forEach(r => {

      let statusHTML = "";

      if(r.payment_status === "pending"){
        statusHTML = `<div class="text text-warning fw-bold">🟡 Pending</div>`;
      }
      else if(r.payment_status === "approved"){
        statusHTML = `<div class="text text-success fw-bold">✅ Approved</div>`;
      }
      else if(r.payment_status === "rejected"){
        statusHTML = `<div class="text text-danger fw-bold">❌ Rejected</div>`;
      }

      if(statusHTML){
        $(`#status-${r.tournament_id}`).html(statusHTML);
      }

    });

  });
}

// MY TOURNAMENTS
function loadMyTournaments(){

  document.getElementById("myTournaments").scrollIntoView({
    behavior: "smooth"
  });

  $.get(`http://localhost:3000/myApprovedTournaments/${user.id}`, function(data){

    let html = '';

    if(!data || data.length === 0){
      html = `<p class="text-muted">No approved tournaments yet</p>`;
    } else {

      data.forEach(t => {

        html += `
          <div class="col-md-4 mb-4">
            <div class="card p-3">

              <div class="title mb-2">${t.name}</div>

              <div class="text">Game: ${t.game}</div>
              <div class="text">Prize: ₹${t.prize}</div>
              <div class="text">Date: ${t.date}</div>

              <hr>

              <div class="text fw-bold text-success">🎮 Match Details</div>

              <div class="text">Room ID: ${t.room_id || 'Not Announced'}</div>
              <div class="text">Password: ${t.room_password || 'Not Announced'}</div>
              <div class="text">Match Time: ${t.match_time || 'Not Announced'}</div>

            </div>
          </div>
        `;
      });
    }

    $('#myTournaments').html(html);
  });
}

// NAV
function goToRegister(id){
  window.location.href = `register.html?tournamentId=${id}`;
}

function goProfile(){
  window.location.href = "profile.html";
}

function goHelp(){
  window.location.href = "help.html";
}

function logout(){
  localStorage.removeItem('currentUser');
  window.location.href = "index.html";
}

// LOGIN CHECK
let user = JSON.parse(localStorage.getItem('currentUser'));

if(!user){
  window.location.href = "index.html";
}else{
  $('#userEmail').text(user.email);
}

// INIT
loadTournaments();

</script>
</body>
</html>
